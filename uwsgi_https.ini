[uwsgi]
module = wsgi
chdir = /home/dpm/server/
master = true
processes = 1
threads = 1001
harakiri = 600
https = 0:8000,/home/dpm/server/ssl/server.crt,/home/dpm/server/ssl/server.key,ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-
RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-DSS-AES128-GCM-SHA256:kEDH+AESGCM:ECDHE-RSA-AES128-SHA256:ECD
HE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA:ECDHE-ECDSA-AES128-SHA:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA:ECDHE
-ECDSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES128-SHA:DHE-DSS-AES128-SHA256:DHE-RSA-AES256-SHA256:DHE-DSS-AES256-SHA:DHE-RSA-AES256-SHA:!a
NULL:!eNULL:!EXPORT:!DES:!RC4:!3DES:!MD5:!PSK:!TLS
vacuum = true
die-on-term = true
ssl-enable3 = false
ssl-enable-sslv3 = false
ssl-enable-tlsv1 = false
ssl-option = 67108864
buffer-size = 32768
disable-logging = true