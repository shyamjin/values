<!--PRE REQUISITIES EDIT POPUP COMPONENT START-->
<div class="vp-tooldepqeditpopup vp-control">
    <div class="vp-tooldepqeditpopup__popuptop vp-uielement__popuptop"></div>
    <div class="vp-tooldepqeditpopup__container vp-uielement__popup pt--md pr--xl pb--xl pl--xl bg--white skip_slideup" style="height:250px; overflow: overlay;">
        <div class="vp-tooldepqeditpopup__inputwrap">
            <input type="text" class="vp-tooldepqeditpopup__input input--clear max--width text--cs03 text--regular text--lg skip_slideup" ng-model="searchToolWithVersionKeyword">
        </div>
        <div class="vp-tooldepqeditpopup__optionswrap mt--lg" style="height:150px;">
            <!--VERSION OPTIONS LIST-->
            <ul class="vp-tooldepqeditpopup__optionslist text--cs03 text--regular text--md skip_slideup">
                <!--VERSION ITEM EXAMPLE-->
                <li class="vp-tooldepqeditpopup__optionsitem mt--md skip_slideup" ng-repeat="tool in toolList | filter : searchToolWithVersionKeyword" ng-hide="tool.build_number === '' || tool.build_number === null || tool.build_number === undefined">
                    <div class="vp-tooldepqeditpopup__iteminner text--ellipsis">
                        <div class="vp-tooldepqeditpopup__checkbox vp-uielement__checkbox">
                            <!--ITEM CHECKBOX-->
                            <input type="checkbox" id="vp-deptoolseditpopup__c1_{{tool.tool_name}}_{{tool.version_number}}" class="skip_slideup" name="vp-deptoolseditpopup__c1" ng-model="selectedTools[$index]" value="{{tool}}" ng-click="addMoreTools(tool)" ng-checked="isToolSelected(tool)"/>
                            <label for="vp-deptoolseditpopup__c1_{{tool.tool_name}}_{{tool.version_number}}" class="skip_slideup"></label>
                            <!--ITEM NAME WRAPPER-->
                            <div class="vp-tooldepqeditpopup__itemnamewrap ml--sm inblock vertical--bottom">
                                <label for="vp-deptoolseditpopup__c1_{{tool.tool_name}}_{{tool.version_number}}" class="vp-tooldepqeditpopup__itemname text--ellipsis text--ellipsis--single skip_slideup" title="{{tool.tool_name}} {{tool.version_name}} {{tool.version_number}}">{{tool.tool_name}} {{tool.version_name}} {{tool.version_number}}</label>
                            </div>
                        </div>
                    </div>
                </li>
            </ul>
        </div>

    </div>
    <!--<button style="margin-bottom: 34px;margin-left: 20px;; z-index: 99" type="button" class="vp-uielement__button  vp-uielement__button&#45;&#45;apply mt&#45;&#45;xl" ng-click="closeAddMoreTools()">Apply</button>-->
</div>
<!--PRE REQUISITIES EDIT POPUP COMPONENT END-->
