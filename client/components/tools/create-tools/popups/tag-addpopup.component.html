<!--PRE REQUISITIES EDIT POPUP COMPONENT START-->
<div class="vp-prereqeditpopup vp-control">
    <div class="vp-prereqeditpopup__popuptop vp-uielement__popuptop"></div>
    <div class="vp-prereqeditpopup__container vp-uielement__popup pt--md pr--xl pb--xl pl--xl bg--white skip_slideup" style="height:250px;overflow-x: hidden;overflow-y: auto;">
        <div class="vp-prereqeditpopup__inputwrap">
            <input type="text" class="vp-prereqeditpopup__input input--clear max--width text--cs03 text--regular text--lg skip_slideup" ng-model="searchTagKeyword">
        </div>
        <div class="vp-prereqeditpopup__optionswrap mt--lg" style="height:150px;">
            <!--VERSION OPTIONS LIST-->
            <ul class="vp-prereqeditpopup__optionslist text--cs03 text--regular text--md skip_slideup">
                <!--VERSION ITEM EXAMPLE-->
                <li class="vp-prereqeditpopup__optionsitem mt--md skip_slideup" ng-repeat="item in allTags | orderBy:'name' | filter:searchTagKeyword">
                    <div class="vp-prereqeditpopup__iteminner text--ellipsis">
                        <div class="vp-prereqeditpopup__checkbox vp-uielement__checkbox">
                            <!--ITEM CHECKBOX-->
                            <input type="checkbox" id="vp-tagaddpopup__c1_{{$index}}" class="skip_slideup" name="vp-prereqeditpopup__c1" ng-model="tagDetails[$index]" value="{{item}}" ng-click="selectTag(item)" ng-checked="isTagSelected(item.name)" />
                            <label for="vp-tagaddpopup__c1_{{$index}}" class="skip_slideup"></label>
                            <!--ITEM NAME WRAPPER-->
                            <div class="vp-prereqeditpopup__itemnamewrap ml--sm inblock vertical--bottom">
                                <label for="vp-tagaddpopup__c1_" class="vp-prereqeditpopup__itemname text--ellipsis text--ellipsis--single skip_slideup" title="{{item.name}}">{{item.name}}</label>
                            </div>
                        </div>
                    </div>
                </li>
            </ul>
        </div>
    </div>
    <div class="vp-prereqeditpopup__container vp-uielement__popup pt--sm pr--md pb--xl pl--md bg--white skip_slideup">
        <div class="vp-prereqeditpopup__optionswrap mt--lg">
             <div class="vp-certifiedaddpopup__buttonswrap">
                <!--APPLY BUTTON-->
                <button type="button" class="vp-certifiedaddpopup__applybtn vp-uielement__button vp-uielement__button--apply" ng-click="closeAddTag()">Apply</button>
            </div>
        </div>
    </div>
</div>
<!--PRE REQUISITIES EDIT POPUP COMPONENT END-->
