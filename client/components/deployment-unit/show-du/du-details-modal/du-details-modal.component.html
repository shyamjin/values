<div class="vp-userform vp-userformnewuser vp-control max">
    <ul class="vp-userform__fieldslist text--cs03 pr--lg">
            <li class="vp-userform__fielditem vp-userform__nameitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">ID </label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__namecontent inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{application.data._id.$oid}} </label>
                    </div>
                    <div class="">
                        <button type="button" class="vp-uielement__button vp-uielement__button--edittool absolute pos--right pos--top mt--md" ui-sref="editDU({id:application.data._id.$oid})" style="margin-top: 6.3%; margin-right: 13%;">Edit</button>
                    </div>
                    <div class="">
                        <button type="button" class="vp-uielement__button vp-uielement__button--edittool absolute pos--right pos--top mt--md" ng-click="duSetDeploy(deployDUSetData)" style="margin-top: 6.3%;background-color: #254b75;color: white; margin-right: 5%;">Deploy</button>
                    </div>
                </div>
            </li>
            <li class="vp-userform__fielditem vp-userform__nameitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Type:</label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__namecontent inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{application.data.type}} </label>
                    </div>
                </div>
            </li>
            <li class="vp-userform__fielditem vp-userform__roleitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'EMPLOYEE ID' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Pre-requisites:</label>
                    </div>
                    <!--'EMPLOYEE ID' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__emailcontent inblock">
                       <ul class="vp-versionform__prerequisiteslist clearfix">
                           <!--ITEM EXAMPLE-->
                           <li class="vp-versionform__prerequisitesitem mb--sm left" ng-repeat="prerequisite in application.data.pre_requiests" style="margin-right: 20px;">
                               <div class="vp-versionform__prerequisitesiteminner">
                                   <span class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{prerequisite.name}} {{prerequisite.version}}<span ng-if="$index!==application.data.pre_requiests.length-1">, </span> </span>
                               </div>
                           </li>
                       </ul>
                    </div>
                </div>
            </li>
            <li class="vp-userform__fielditem vp-userform__roleitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'EMPLOYEE ID' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Included in:</label>
                    </div>
                    <!--'EMPLOYEE ID' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__emailcontent inblock">
                        <ul class="vp-versionform__prerequisiteslist clearfix">
                            <!--ITEM EXAMPLE-->
                            <li class="vp-versionform__prerequisitesitem mb--sm left" ng-repeat="duSet in application.data.included_in" style="margin-right: 20px;">
                                <div class="vp-versionform__prerequisitesiteminner">
                                    <span class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{duSet.du_set_name}}<span ng-if="$index!==application.data.included_in.length-1">, </span> </span>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </li>
            <li class="vp-userform__fielditem vp-userform__roleitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'EMPLOYEE ID' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Release notes:</label>
                    </div>
                    <!--'EMPLOYEE ID' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__emailcontent inblock">
                        <ul class="vp-versionform__prerequisiteslist clearfix">
                            <!--ITEM EXAMPLE-->
                            <li class="vp-versionform__prerequisitesitem mb--sm left" style="margin-right: 20px;">
                                <div class="vp-versionform__prerequisitesiteminner">
                                    <p id="release_notes_du" class="vp-userform__fieldlabel text--light text--md text--ellipsis input--clear" style="width:700px; height: auto">{{application.data.release_notes}}</p>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
                <div style="margin-left: 134px;">
                    <button ng-if="application.data.release_notes.length>120 && showLessDUReleaseNotes === true" type="button" class="vp-versionform__notesshowallbtn vp-uielement__button vp-uielement__button--cleanenabled mt--sm pa--none" ng-click="showLessReleaseNotesContent()">Show Less</button>
                    <button ng-if="application.data.release_notes.length>120 && showAllDUReleaseNotes === true" type="button" class="vp-versionform__notesshowallbtn vp-uielement__button vp-uielement__button--cleanenabled mt--sm pa--none" ng-click="showMoreReleaseNotesContent()">Show all</button>
                </div>
            </li>
            <li class="vp-userform__fielditem vp-userform__nameitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Deployer to use:</label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__namecontent inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{application.data.deployer_to_use}} </label>
                    </div>
                </div>
            </li>
            <li class="vp-userform__fielditem vp-userform__nameitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Repository to use:</label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__namecontent inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{application.data.repository_to_use}} </label>
                    </div>
                </div>
            </li>
             <li class="vp-userform__fielditem vp-userform__nameitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <span class="text--light text--md">Deployment Type:</span>
                      <span class="vp-createnewmachform__fieldcontent vp-createnewmachform__hostcontent inblock">
                            <select id="entity_type" name="vp-userform__dropdownlist_entity_type" class="vp-userform__dropdownlist vp-uielement__select" ng-model="deploymentTypeToSelect.type" style="margin-left:30px; width: 170px;" ng-change="setDUDeployType(deploymentTypeToSelect.type)">
                                <option value="">-- Default (Latest Build) --</option>
                                <option value="Build">Specified Build</option>
                                <option value="State">Specified State</option>
                            </select>
                      </span>
                </div>
            </li>
            <li class="vp-userform__fielditem vp-userform__nameitem pt--xxl" ng-if="BuildFlag === true">
                <div class="vp-userform__fielditeminner">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Build No:<span class="mandatory">*</span></label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-versionform__content inblock">
                        <div class="vp-versionform__content inblock">
                            <div class="vp-versionform__statusselectwrap">
                                <select name="vp-versionform__dropdownlist2" id="build"  ng-model="selectedBuild" name="selectedBuild" class="vp-versionform__dropdownlist vp-versionform__dropdownlist2 vp-uielement__select max--width"  style="height:26px; width: 180px;" ng-change="showBuildDetails(selectedBuild)">
                                    <option ng-repeat="build in application.data.build" value="{{build}}">{{build.build_number}}</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </li>

            <li class="vp-userform__fielditem vp-userform__nameitem pt--xxl" ng-if="StateFlag === true">
                <div class="vp-userform__fielditeminner">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">State:<span class="mandatory">*</span> </label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-versionform__content inblock">
                        <div class="vp-versionform__content inblock">
                            <div class="vp-versionform__statusselectwrap">
                                <select name="vp-versionform__dropdownlist2" id="state"  ng-model="selectedState" name="selectedState" class="vp-versionform__dropdownlist vp-versionform__dropdownlist2 vp-uielement__select max--width"  style="height:26px; width: 180px;" ng-change="showStateDetails(selectedState)">
                                    <option ng-repeat="state in application.data.state" value="{{state}}">{{state.name}}</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </li>

            <div ng-if="buildDetails">
                <br>
                <div class="vp-userform__fielditeminner mb--xl" ng-if="StateFlag === true">
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">State Status: </label>
                    </div>
                    <div class="vp-versionform__content inblock">
                        <div class="vp-userform__fieldlabelwrap inblock">
                            <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{StateDetails.approval_status}}</label>
                        </div>
                    </div>
                </div>
                <div class="vp-userform__fielditeminner mb--xl">
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Build No: </label>
                    </div>
                    <div class="vp-versionform__content inblock">
                        <div class="vp-userform__fieldlabelwrap inblock">
                            <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{buildDetails.build_number}}</label>
                        </div>
                    </div>
                </div>
                <div class="vp-userform__fielditeminner mb--xl">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Build Type: </label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-versionform__content inblock">
                        <div class="vp-userform__fieldlabelwrap inblock">
                            <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{buildDetails.type}}</label>
                        </div>
                    </div>
                </div>
                <div class="vp-userform__fielditeminner mb--xl">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Build Size: </label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-versionform__content inblock">
                        <div class="vp-userform__fieldlabelwrap inblock">
                            <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{buildDetails.file_size}}</label>
                        </div>
                    </div>
                </div>
                <div class="vp-userform__fielditeminner mb--xl">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Created: </label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-versionform__content inblock">
                        <div class="vp-userform__fieldlabelwrap inblock">
                            <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{buildDetails.build_date.$date | date : "MMM d, y h:mm a"}}</label>
                        </div>
                    </div>
                </div>
                <div class="vp-userform__fielditeminner">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Release Notes: </label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-versionform__content inblock">
                        <div class="vp-userform__fieldlabelwrap inblock">
                            <p id="release_notes_build" class="vp-userform__fieldlabel text--light text--md text--ellipsis input--clear" style="width:700px; height: auto">{{buildDetails.additional_info.release_notes}}</p>
                        </div>
                    </div>
                </div>
                <div style="margin-left: 134px;">
                    <button ng-if="buildDetails.additional_info.release_notes.length>120 && showAllReleaseNotes === false" type="button" class="vp-versionform__notesshowallbtn vp-uielement__button vp-uielement__button--cleanenabled mt--sm pa--none" ng-click="showLessReleaseNotes()">Show Less</button>
                    <button ng-if="buildDetails.additional_info.release_notes.length>120 && showAllReleaseNotes === true" type="button" class="vp-versionform__notesshowallbtn vp-uielement__button vp-uielement__button--cleanenabled mt--sm pa--none" ng-click="showMoreReleaseNotes()">Show all</button>
                </div>
                <!--Khalil Jiries - add checksum info-->
                <br>
                <div ng-if="buildDetails.additional_info.checksum" class="vp-userform__fielditeminner">
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Checksum: </label>
                    </div>
                    <div class="vp-versionform__content inblock">
                        <div class="vp-userform__fieldlabelwrap inblock">
                            <p class="vp-userform__fieldlabel text--light text--md text--ellipsis input--clear" style="width:700px; height: auto">
                                <button ng-if="showAllChecksum === true" type="button" class="vp-versionform__notesshowallbtn vp-uielement__button vp-uielement__button--cleanenabled mt--sm pa--none" ng-click="showMoreChecksum()">Show checksum</button>
                                <button ng-if="showAllChecksum === false" type="button" class="vp-versionform__notesshowallbtn vp-uielement__button vp-uielement__button--cleanenabled mt--sm pa--none" ng-click="showLessChecksum()">Hide checksum</button>
                            </p>
                        </div>
                    </div>
                    <div ng-if="showAllChecksum === false">
                        <table>
                            <tr>
                                <th>File</th>
                                <th>&nbsp;&nbsp;&nbsp;&nbsp;</th>
                                <th>Checksum</th>
                            </tr>
                            <tr ng-repeat="entry in buildDetails.additional_info.checksum">
                                <td>{{ entry.file }}</td>
                                <td>&nbsp;&nbsp;&nbsp;&nbsp;</td>
                                <td>{{ entry.chksum }}</td>
                            </tr>
                        </table>
                    </div>
                </div>
                <!--Khalil Jiries - add checksum info - END-->
            </div>

            <li class="vp-userform__fielditem vp-userform__emailitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'EMPLOYEE ID' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Tags:</label>
                    </div>
                    <!--'EMPLOYEE ID' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__emailcontent inblock">
                        <section class="vp-versionform__prerequisites mt--xl">
                            <div class="vp-versionform__prerequisitescontent--filled">
                                <ul class="vp-versionform__prerequisiteslist clearfix">
                                    <!--ITEM EXAMPLE-->
                                    <li class="vp-versionform__prerequisitesitem mb--sm left" ng-repeat="tag in application.data.tag" style="margin-right: 20px;">
                                        <div class="vp-versionform__prerequisitesiteminner">
                                            <span class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{tag}}<span ng-if="$index!==application.data.tag.length-1">, </span></span>
                                        </div>
                                    </li>
                                </ul>
                            </div>
                        </section>
                    </div>
                </div>
            </li>
            <li class="vp-userform__fielditem vp-userform__roleitem margin_bottom pt--lg" style="margin-top: 40px;">
                <div class="vp-versionform vp-component bg--white max--width">
                    <div class="vp-userform__fielditeminner">
                        <!--'EMPLOYEE ID' FIELD LABEL-->
                        <div class="vertical--top inblock">
                            <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Flexible Attributes:</label>
                        </div>
                        <flexible-attributes entity="DeploymentUnit" fa-name-value-map="faNameValueMap" on-fa-load="faDefLoaded(faDef)" disabled="true"/>
                    </div>
                </div>
            </li>
        </ul>
</div>
