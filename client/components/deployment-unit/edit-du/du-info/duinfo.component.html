<!--ADD USER FORM COMPONENT START-->
<div class="vp-userform vp-userformnewuser vp-control max">
        <ul class="vp-userform__fieldslist text--cs03 pr--lg">

                </div>
                </div>
            </li>
            <h5 class="validation_msg_tool_set" ng-show="CreateNewDUForm.du_type.$error.required">Please select DU type</h5>

                    </div>
                </div>
            </li>

                    </div>

                        <input type="text" class="vp-userform__nameinput input--clear" name="branch" ng-model="application.data.branch"/>
                    </div>
                </div>
            </li>

            <!--'EMPLOYEE ID' FIELD-->

                                </li>
                            </ul>
                        </div>
                    </div>
                    </div>
                </div>
            </li>
            <h5 class="validation_msg_tool_set" ng-show="CreateNewDUForm.tags.$error.required">Please enter tags!</h5>

                                <li class="vp-versionform__prerequisitesitem mb--sm right skip_slideup" ng-repeat="prerequisite in application.data.pre_requiests">

                            </ul>
                        </div>

                    </div>
                </div>
