<!--USER-SEARCH COLUMN COMPONENT START-->
<div class="vp-machinessearch bg--white max--width">
    <span class="vp-machinessearch__topborder block"></span>
    <div class="vp-usersssearch__searchboxwrap pt--md pr--md pl--md">
         <!--SEARCH FIELD (MODIFIERS: # vp-machinessearch__searchbox--drop)-->
        <div class="vp-machinessearch__searchbox vp-uielement__searchbox relative">
            <div class="vp-machinessearch__searchautocomplete bg--cs06 absolute hidden" ng-include="'static/components/tools/deploy-tools/search-autocomplete/searchautocomplete.component.html'"></div>
            <form id="vp-machinessearch__searchform vp-uielement__searchform">
                <!--SEARCH INPUT TEXT-->
                <input class="vp-machinessearch__searchinput vp-uielement__searchinput" name="searchMachine" ng-model="searchMachine" type="text" placeholder="Find Machine" />
                <!--SEARCH INPUT SUBMIT BUTON-->
                <button class="vp-machinessearch__searchbtn vp-uielementt__searchbtn" type="button"></button>
            </form>
        </div>
    </div>
    <div class="vp-machinessearch__listwrapper max--width">
        <ul class="vp-machinessearch__list machine_scroll max--width">

            <!--ITEM EXAMPLE (MODIFIERS: # vp-machinessearch__item--test # vp-machinessearch__item--prod)-->
            <li ng-class="getStatusClass(request)"  ng-repeat="request in distributionService.data | filter:searchMachine">
                <div class="vp-machinessearch__iteminner pl--xxxl text--regular text--md relative clearfix">
                    <div class="vp-machinessearch__itemdescriptionwrap left">
                        <span class="vp-machinessearch__itemdescription text--cs03 text--ellipsis text--ellipsis--single" style="margin-top:15px;">{{request.machine_name}}</span>
                    </div>
                    <div class="vp-machinessearch__itembtnwrap pointer relative right relative hidden">
                        <span class="vp-machinessearch__itembtn bg--cs07 text--center text--cs06 text--regular text--md absolute"   ng-click="isMachineSelected(request)"> Select</span>
                    </div>
                    <!--<div class="vp-machinessearch__itembtnwrap pointer relative right hidden" ng-if="pageTitle==='Manage Machines'">
                        <span class="vp-machinessearch__itembtn bg&#45;&#45;cs07 text&#45;&#45;center text&#45;&#45;cs06 text&#45;&#45;regular text&#45;&#45;md absolute" href="/editmachine/{{machine._id.$oid}}">Select</span>
                    </div>-->
                </div>
            </li>
        </ul>
    </div>
</div>
<!--USER-SEARCH COLUMN COMPONENT END-->
