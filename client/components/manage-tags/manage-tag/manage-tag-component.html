<!--USERS TAB COMPONENT START-->
<div class="vp-distributioncont relative" ng-controller="EditTagController">
    <!--ATTENTION DIALOG WRAPPER (MODIFIERS: # vp-deploytools__atttentionmodalwrap--show )-->
    <div class="vp-deploytools__atttentionmodalwrap fixed max--position hidden" id="show_delete_tag_confirmation_popup">
        <div class="vp-deploytools__atttentionmodal absolute" ng-include="'static/components/manage-tags/attention-modal/attentionmodal.component.html'"></div>
    </div>
    <div class="vp-distributioncont__distributionsearch vertical--top inblock" style="width: 40%;" ng-include="'static/components/manage-tags/tag-list-search/taglistsearch.component.html'"></div>
    <!--USER INFO COLUMN-->
    <div class="vp-distributioncont__userinfo ml--xxxl vertical--to inblock"  ng-include="'static/components/manage-tags/tag-info/taginfo.component.html'"></div>
    <!--TOOLBAR-->
    <div class="vp-distributioncont__toolbar bg--cs06 max--width fixed pos--bottom pos--left" ng-if="tagSelected===true">
        <div class="vp-distributioncont__innerbounded clearfix">
            <div class="vp-distributioncont__updatebtnwrap right">
                <!--UPDATE BUTTON (MODIFIERS: # vp-uielement__button--deploydisabled )-->
                <button type="button" class="vp-distributioncont__updatebtn vp-uielement__button vp-uielement__button--deployenabled pr--lg pl--lg" ng-click="editTag(EditTagForm)">Save changes</button>
            </div>
            <div class="vp-createanewmach__discardbtnwrap mr--xxxl right">
                <button type="button" class="vp-createanewmach__discardbtn vp-uielement__button vp-uielement__button--cleanenabled" ng-click="discardTagChanges()">Discard</button>
            </div>
        </div>
    </div>
</div>
<!--distribution TAB COMPONENT END-->
