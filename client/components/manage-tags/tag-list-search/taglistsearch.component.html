<!--PERMISSIONS SELECT FORM COMPONENT START-->
<div class="vp-permissionsselect bg--white max">
    <!--COLUMN LABELS SECTION-->
    <section class="vp-permissionsselect__header text--capitalize text--cs03 text--light text--md max--width">
        <label class="vp-permissionsselect__admincol pre_requistize_style inblock " style="width: 65%;color: white;">Tags</label>
        <label class="vp-permissionsselect__admincol pre_requistize_style inblock " style="color: white;">Edit</label>
        <label class="vp-permissionsselect__operatorcol pre_requistize_style inblock " style="color: white;">Delete</label>
        <input placeholder="tags search" class="input-sm form-control" type="search" ng-model="searchTagKeyword" style="width: 85%; margin-top: 2%;"/>
    </section>
    <!--PERMISSIONS SELECT SECTION-->
    <section class="vp-permissionsselect__body max--width" style="height:700px; overflow: overlay;">
        <form action="#" name="vp-permissionsselect__form">
            <ul class="vp-permissionsselect__list">
                <!--DEPLOY TOOLS PERMISSIONS-->
                <li class="vp-permissionsselect__item vp-permissionsselect__itemdeploytools pt--xl max--width" ng-repeat="tag in allTags | filter : searchTagKeyword">
                    <div class="vp-permissionsselect__iteminner">
                        <div class="vp-permissionsselect__rolecol vertical--bottom text--regular text--lg inblock" style="width: 65%; line-height: 2.2">
                            <span class="text--ellipsis text--ellipsis--single">{{tag.name}}</span>
                        </div>
                        <div class="vp-permissionsselect__admincol inblock">
                           <div class="vp-teamsform__editcol vertical--top pt--md inblock">
                               <button type="button" class="vp-versionform__editdeploydetails vp-uielement__button vp-uielement__button--edit" ng-click="selectTag(tag._id.$oid)"></button>
                           </div>
                        </div>
                        <div class="vp-permissionsselect__operatorcol inblock">
                            <!--OPERATOR CHECKBOX-->
                            <div class="vp-teamsform__deletecol vertical--top pt--md inblock">
                                <button type="button" class="vp-versionform__removescreenshotbtn vp-uielement__button vp-uielement__button--removeenabled pl--xxl" ng-click="openDeleteTagConfirmationPopup(tag._id.$oid)"></button>
                            </div>
                        </div>
                    </div>
                </li>
            </ul>
        </form>
    </section>
</div>
<!--PERMISSIONS SELECT FORM COMPONENT END-->
