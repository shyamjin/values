<div class="login-box">
    <div class="login-logo">
        <img alt="" src="static/assets/images/Deployment.png">
    </div>
    <div style="">
        <table style="border-style:black;border-width:1px">
            <tr>
                <td>
                    <div style="" ng-controller="ChangePasswordController">
                        <form name="changePasswordForm" role="form">
                            <div class="row" style="">
                                <div class="">
                                    <label style="margin-left:-5px" for="newPassword">New Password:</label>
                                    <input id="newPassword" name="newPassword" type="password" class="login-input" ng-model="newPassword">
                                </div>
                                <div class="">
                                    <label style="margin-left:-30px" for="confirmPassword">Confirm Password:</label>
                                    <input id="confirmPassword" name="confirmPassword" type="password" class="login-input" ng-model="confirmNewPassword">
                                </div>
                            </div>
                            <div class="row" >
                                <div class="login-footer">
                                    <button class="login-button" style="border-radius: 10px; width: 160px;" ng-click="changePassword(changePasswordForm)">Change Password</button>
                                </div>
                            </div>
                            <br>
                            <div class="row" >
                                <div class="col-s6">
                                    <a style="color: white; left:35%; position: relative;"  href="#/login">Back to login</a>
                                    <!-- <a style="color: white; left:30%; position: relative;" href="#/signup"  >Sign Up</a> -->
                                </div>
                            </div>
                        </form>
                        <div style="margin-top:20px; margin-left:10%; color:red; padding-bottom:3%; font-weight: 400; font-size: 16px;" ng-if="errorMessage">{{errorMessage}}</div>
                    </div>
                </td>
            </tr>
        </table>
    </div>
</div>
