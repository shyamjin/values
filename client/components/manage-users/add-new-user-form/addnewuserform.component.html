<!--ADD USER FORM COMPONENT START-->
<div class="vp-userform vp-userformnewuser vp-control max">
    <form action="#" name="vp-userform__userform" class="vp-userform__userform max">
        <ul class="vp-userform__fieldslist text--cs03 pr--lg">
            <!--'NAME' FIELD-->
            <li class="vp-userform__fielditem vp-userform__nameitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Name<span class="mandatory">*</span> </label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__namecontent inblock">
                        <input type="text" class="vp-userform__nameinput input--clear" name="vp-userform__nameinput" ng-model="newUsersData.userName">
                        <h5 class="mandatory" ng-if="useradd_errors.userName">{{useradd_errors.userName}}</h5>
                    </div>
                </div>
            </li>
             <!--&lt;!&ndash;'PASSWORD' FIELD&ndash;&gt;-->
            <!--<li class="vp-userform__fielditem vp-userform__passworditem pt&#45;&#45;xxl">-->
                <!--<div class="vp-userform__fielditeminner">-->
                    <!--&lt;!&ndash;'PASSWORD' FIELD LABEL&ndash;&gt;-->
                    <!--<div class="vp-userform__fieldlabelwrap inblock">-->
                        <!--<label class="vp-userform__fieldlabel text&#45;&#45;light text&#45;&#45;md text&#45;&#45;ellipsis text&#45;&#45;ellipsis&#45;&#45;single">Password<span class="mandatory">*</span> </label>-->
                    <!--</div>-->
                    <!--&lt;!&ndash;'PASSWORD' FIELD CONTENT&ndash;&gt;-->
                    <!--<div class="vp-userform__fieldcontent vp-userform__passwordcontent inblock">-->
                        <!--<input type="password" class="vp-userform__passwordinput input&#45;&#45;clear" name="vp-userform__passwordinput" ng-model="newUsersData.password">-->
                        <!--<h5 class="mandatory" ng-if="useradd_errors.password">{{useradd_errors.password}}</h5>-->
                    <!--</div>-->
                <!--</div>-->
            <!--</li>-->
            <!--'EMPLOYEE ID' FIELD-->
            <li class="vp-userform__fielditem vp-userform__emailitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'EMPLOYEE ID' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Employee ID<span class="mandatory">*</span> </label>
                    </div>
                    <!--'EMPLOYEE ID' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__emailcontent inblock">
                        <input type="number" class="vp-userform__emailinput input--clear" name="vp-userform__employeeIdinput" min="0" ng-model="newUsersData.employeeId">
                        <h5 class="mandatory" ng-if="useradd_errors.employeeId">{{useradd_errors.employeeId}}</h5>
                    </div>
                </div>
            </li>
            <!--'EMAIL' FIELD-->
            <li class="vp-userform__fielditem vp-userform__emailitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'NAME' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Email<span class="mandatory">*</span> </label>
                    </div>
                    <!--'NAME' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__emailcontent inblock">
                        <input type="email" class="vp-userform__emailinput input--clear" name="vp-userform__emailinput" ng-model="newUsersData.email">
                        <h5 class="mandatory" ng-if="useradd_errors.email">{{useradd_errors.email}}</h5>
                    </div>
                </div>
            </li>
            <!--'ROLE' FIELD-->
            <li class="vp-userform__fielditem vp-userform__roleitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'ROLE' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Role<span class="mandatory">*</span></label>
                    </div>
                    <!--'ROLE' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__rolecontent inblock">
                        <select name="vp-userform__dropdownlist" class="vp-userform__dropdownlist vp-uielement__select" ng-model="newUsersData.role">
                            <option value="">--------  Select Role  --------</option>
                            <option  name="vp-userform__role_dropdownlistoption_{{$index}}"  ng-repeat="role in roles.data" value="{{role._id.$oid}}">{{role.name}}</option>
                      </select>
                        <h5 class="mandatory" ng-if="useradd_errors.role">{{useradd_errors.role}}</h5>
                    </div>
                </div>
            </li>
            <!--'ACCOUNT' FIELD-->
            <li class="vp-userform__fielditem vp-userform__roleitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'ACCOUNT' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Account<span class="mandatory">*</span></label>
                    </div>
                    <!--'ACCOUNT' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__rolecontent inblock">
                        <select name="vp-userform__dropdownlist" class="vp-userform__dropdownlist vp-uielement__select" ng-model="account.selected">
                            <option value="">-------  Select Account  --------</option>
                            <option  name="vp-userform__account_dropdownlistoption_{{$index}}"  ng-repeat="account in accounts.data" value="{{account._id.$oid}}">{{account.name}}</option>
                      </select>
                        <h5 class="mandatory" ng-if="useradd_errors.account">{{useradd_errors.account}}</h5>
                    </div>
                </div>
            </li>
            <!--'DEFAULT HOME' FIELD-->
            <li class="vp-userform__fielditem vp-userform__roleitem pt--xxl">
                <div class="vp-userform__fielditeminner">
                    <!--'ACCOUNT' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Default home page</label>
                    </div>
                    <!--'ACCOUNT' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__rolecontent inblock">
                        <select name="vp-userform__dropdownlist_default_home_page" class="vp-userform__dropdownlist vp-uielement__select" ng-model="newUsersData.homepage">
                            <option value="">--- Select default home ---</option>
                            <option  name="vp-userform__account_dropdownlistoption_home_tool" value="Tool Dashboard">Tool Dashboard</option>
                            <option  name="vp-userform__account_dropdownlistoption_home_du" value="DU Dashboard">DU Dashboard</option>
                      </select>
                    </div>
                </div>
            </li>
            <li class="vp-userform__fielditem vp-userform__roleitem pt--md">
                <div class="vp-userform__fielditeminner">
                    <!--'ADD USERS TO GROUP' FIELD LABEL-->
                    <div class="vp-userform__fieldlabelwrap inblock">
                        <label class="vp-userform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Member of</label>
                    </div>
                    <!--'ADD USERS TO GROUP' FIELD CONTENT-->
                    <div class="vp-userform__fieldcontent vp-userform__memberofcontent inblock">
                        <div class="vp-machdetails__fieldcontent inblock">
                            <div class="vp-machdetails__fieldtypewrap vp-machdetails__editablewrap inblock set_margin_rad">
                                <div class="vp-createnewmachform__fieldcontent vp-createnewmachform__userscontent inblock">
                                    <ul class="vp-createnewmachform__userslist clearfix">
                                        <!--USER ROW EXAMPLE-->
                                        <li class="vp-createnewmachform__useritem mt--sm mr--md left" ng-repeat="team in includedIn track by $index">
                                            <div class="vp-createnewmachform__useriteminner text--regular text--lg text--cs03 nowrap">
                                                <div class="vp-createnewmachform__userinfowrap inblock">
                                                    <span class="vp-createnewmachform__userinfo text--ellipsis text--ellipsis--single">{{team.team_name}}</span>
                                                </div>
                                                <div class="vp-createnewmachform__userremovebtnwrap vertical--top inblock">
                                                    <button type="button" class="vp-createnewmachform__userremovebtn vp-uielement__button vp-uielement__button--smallclose vertical--middle pa--none ml--sm" ng-click="toggleSelection(team)"></button>
                                                </div>
                                            </div>
                                        </li>
                                        <li class="vp-createnewmachform__addusersbuttonitem mt--sm mr--md pa--none left">
                                            <div class="vp-createnewmachform__addusersbuttoniteminner inblock">
                                                <button type="button" class="vp-uielement__button vp-uielement__button--cleanenabled"><span class="vertical--middle" ng-click="showAddTeam()">+Add this user to teams</span></button>
                                            </div>
                                            <div id="add_user_to_team" class="vp-versionform__addcertifieditembtnpopup hidden" ng-include="'static/components/manage-users/popups/addteamspopup.component.html'"></div>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </li>
        </ul>
    </form>
</div>
<!--ADD USER FORM COMPONENT END-->
