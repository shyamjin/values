<!--'CREATE A NEW MACHINE' TAB CONTENT COMPONENT START-->
<div class="vp-createnewmachform vp-control bg--white max">
    <div class="vp-createnewmachform__createanewmachine max--width">
        <ul class="vp-createnewmachform__fieldslist text--cs03 max--width">
            <!--FIELD ROW IP-->
            <li class="vp-createnewmachform__fielditem vp-createnewmachform__ipitem mt--xxxxl">
                <div class="vp-createnewmachform__fielditeminner">
                    <div class="vp-createnewmachform__fieldlabelwrap inblock">
                        <label class="vp-createnewmachform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Prerequisite name<span class="vp-createnewmachform__fieldrequire">*</span>:</label>
                    </div>
                    <div class="vp-createnewmachform__fieldcontent vp-createnewmachform__ipcontent inblock">
                        <input type="text" class="vp-createnewmachform__ipinput input--clear" name="prerequiiste_name" ng-model="prerequisiteData.prerequisite_name" required>
                        <span class="vp-search__hint vp-uielement__hint ml--sm">e.g. Java</span>
                    </div>
                </div>
            </li>
            <li class="vp-createnewmachform__fielditem vp-createnewmachform__ipitem mt--xxxxl">
                <div class="vp-createnewmachform__fielditeminner">
                    <div class="vp-createnewmachform__fieldlabelwrap inblock">
                        <label class="vp-createnewmachform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Display name<span class="vp-createnewmachform__fieldrequire">*</span>:</label>
                    </div>
                    <div class="vp-createnewmachform__fieldcontent vp-createnewmachform__ipcontent inblock">
                        <input type="text" class="vp-createnewmachform__ipinput input--clear" name="display_name" ng-model="prerequisiteData.display_name" required>
                    </div>
                </div>
            </li>
            <!--STATUS-->
            <li class="vp-createnewmachform__connectionsubitem vp-createnewmachform__pwditem mt--xxxxl">
                <div class="vp-createnewmachform__fielditeminner">
                    <!--PWD FIELD LABEL-->
                    <div class="vp-createnewmachform__fieldlabelwrap inblock">
                        <label class="vp-createnewmachform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Status<span class="vp-createnewmachform__fieldrequire">*</span>:</label>
                    </div>
                    <!--PWD FIELD CONTENT-->
                    <div class="vp-machdetails__fieldcontent inblock">
                        <div class="vp-machdetails__tunnelinglabelinputwrap vp-machdetails__tunnelingcolumn pr--md left">
                            <select id="shell_type_{{$index}}" name="vp-shell_type" class="vp-userform__dropdownlist dropdown_auth_type vp-uielement__select" ng-model="prerequisiteData.prerequisites_status" style="width: 200px;">
                                <option value="{{status}}" ng-repeat="status in prerequisiteStatus ">{{status}}</option>
                            </select>
                        </div>
                    </div>
                </div>
            </li>
            <li class="vp-createnewmachform__fielditem vp-createnewmachform__ipitem mt--xxxxl">
                <div class="vp-createnewmachform__fielditeminner">
                    <div class="vp-createnewmachform__fieldlabelwrap inblock">
                        <label class="vp-createnewmachform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Version command:</label>
                    </div>
                    <div class="vp-createnewmachform__fieldcontent vp-createnewmachform__ipcontent inblock">
                        <input type="text" class="vp-createnewmachform__ipinput input--clear" name="version_command" ng-model="prerequisiteData.version_command" required>
                    </div>
                </div>
            </li>
            <li class="vp-createnewmachform__fielditem vp-createnewmachform__ipitem mt--xxxxl">
                <div class="vp-createnewmachform__fielditeminner">
                    <div class="vp-createnewmachform__fieldlabelwrap inblock">
                        <label class="vp-createnewmachform__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Parse version:</label>
                    </div>
                    <div class="vp-createnewmachform__fieldcontent vp-createnewmachform__ipcontent inblock">
                        <input type="text" class="vp-createnewmachform__ipinput input--clear" name="parse_version" ng-model="prerequisiteData.parse_version" required>
                    </div>
                </div>
            </li>
            <li class="vp-machdetails__connectionfielditem vp-machdetails__connectiontunneling mt--xl max--width mt--xxxxl">
                    <div class="vp-machdetails__fieldlabelwrap inblock">
                        <label class="vp-machdetails__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">Version list<span class="vp-createnewmachform__fieldrequire">*</span>:</label>
                    </div>
                    <!--TUNNELING FIELD CONTENT-->
                    <div class="vp-machdetails__tunnelingcontent max--width mt--xl">
                        <!--COLUMN LABELS-->
                        <div class="vp-machdetails__tunnelinglabelwrap text--light text--md clearfix label_div" style="margin-left:120px;">
                            <span class="vp-machdetails__tunnelingcolumn pl--md left span_mark" style="width:140px; margin-right: 40px;">Index</span>
                            <span class="vp-machdetails__tunnelingcolumn pl--md left span_mark" style="width:110px;">Version</span>
                        </div>
                        <hr class="vp-machdetails__tunnelingseparator ba--clear bg--cs09 mt--sm">
                        <!--TUNNELING INPUTS-->
                        <div class="vp-machdetails__tunnelinginputswrap mt--sm" style="margin-left:130px;">
                            <ul class="vp-machdetails__tunnelinginputslist">
                                <!--TUNNELING INPUTS ROW EXAMPLE-->
                                <li class="vp-machdetails__tunnelingitem mt--lg clearfix" ng-repeat="version in prerequisiteData.version_list track by $index">
                                    <form action="#" name="vp-machdetails__tunnelingrow">
                                        <!--TUNNELING LABEL INPUT-->
                                        <div class="vp-machdetails__tunnelinglabelinputwrap vp-machdetails__tunnelingcolumn pr--md left">
                                            <label class="vp-machdetails__fieldlabel text--light text--md text--ellipsis text--ellipsis--single">{{$index+1}}:</label>
                                        </div>
                                        <!--TUNNELING HOST INPUT-->
                                        <div class="vp-machdetails__tunnelinghostinputwrap vp-machdetails__tunnelingcolumn pr--md left" style="margin-left: 130px;">
                                            <input id="auth_host_{{$index}}" type="number" class="vp-machdetails__tunnelinghost input--clear max--width bl--primary br--primary bt--primary bb--primary" name="version_number" ng-model="version.number" required style="margin-left:20px; width: 80px; height: 23px;"/>
                                        </div>
                                        <!--REMOVE BUTTON-->
                                        <button type="button" class="vp-machdetails__removebtn remove_btn_mac vp-uielement__button vp-uielement__button--removeenabled" ng-click="removeVersion($index)"></button>
                                    </form>
                                </li>
                            </ul>
                            <div>
                                <button type="button" class="vp-machdetails__addhostbtn vp-uielement__button vp-uielement__button--cleanenabled mt--sm pa--none" ng-click="addVersion()">+ Add a version</button>
                            </div>
                        </div>
                    </div>
                </li>
        </ul>
    </div>
</div>
