<!--MACHINE DETAILS VERTICAL TAB CONTENT COMPONENT START-->
<div class="vp-machdetails vp-control pt--xxxl pr--xl pb--xxxl pl--xxxl bg--white clearfix max">
    <div class="vp-deploymentrequestmodalwrap fixed max--position hidden"  id="checkSumPopup">
        <div class="vp-deploymentrequestmodal absolute" ng-include="'static/components/shared/popup/checksum-popup.html'"></div>
    </div>

    <div class="vp-permissionsselect bg--white max" ng-if="ToolsOnMachine.length>0">
        <!--COLUMN LABELS SECTION-->
        <section class="vp-permissionsselect__header text--capitalize text--cs03 text--light text--md max--width">
            <label class="vp-deployedtool_version_col inblock"><span class="permissionweight">Tool Name</span></label>
            <label class="vp-deployedtool_version_col inblock"><span class="permissionweight">Version</span></label>
            <label class="vp-deployedtool_version_col inblock"><span class="permissionweight">Build</span></label>
            <label class="vp-deployedtool_version_col inblock"><span class="permissionweight">Latest Available Version</span></label>
            <hr class="vp-permissionsselect__separator mt--md bg--cs09 ba--clear">
        </section>
        <!--PERMISSIONS SELECT SECTION-->
        <section class="vp-permissionsselect__body max--width">
            <form action="#" name="vp-permissionsselect__form">
                <ul class="vp-permissionsselect__list pt--xl">
                    <!--DEPLOY TOOLS PERMISSIONS-->
                    <li class="vp-permissionsselect__item vp-permissionsselect__itemdeploytools pt--xxxl max--width" ng-repeat="tool in ToolsOnMachine">
                        <div class="vp-permissionsselect__iteminner">
                            <div class="vp-deployedtool_version_col vertical--bottom text--regular text--lg inblock">
                                <span class="text--ellipsis text--ellipsis--single" style="white-space:pre-wrap">{{tool.name}}</span>
                            </div>
                            <div class="vp-deployedtool_version_col vertical--bottom text--regular text--lg inblock">
                                <span class="text--ellipsis text--ellipsis--single" style="white-space:pre-wrap">{{tool.version.version_name}} v {{tool.version.version_number}}</span>
                            </div>
                            <div class="vp-deployedtool_version_col vertical--bottom text--regular text--lg inblock">
                                <span class="text--ellipsis text--ellipsis--single" ng-if="tool.build_no">{{tool.build_no}}</span>
                                <span class="text--ellipsis text--ellipsis--single" ng-if="tool.build_no === null || tool.build_no === undefined || tool.build_no === ''"> -- </span>
                            </div>
                            <div class="vp-deployedtool_version_col vertical--bottom text--regular text--lg inblock">
                                <span class="text--ellipsis text--ellipsis--single">{{tool.latest_version_number}}</span>
                            </div>
                            <div class="vp-deployedtool_actions_col vertical--bottom text--regular text--lg inblock">
                                <div class="vp-machdetails__fieldtypewrap vp-machdetails__editablewrap inblock">
                                    <button type="button" class="vp-machdetails__ipeditbtn vp-uielement__button vp-uielement__button--cleanenabled pa--none" ng-click="redeployTool(tool.version._id.$oid, tool.build_no, tool.build_id, Machine.data._id.$oid)">Redeploy</button>
                                </div>
                            </div>
                            <div class="vp-deployedtool_actions_col vertical--bottom text--regular text--lg inblock">
                                <div class="vp-machdetails__fieldtypewrap vp-machdetails__editablewrap inblock">
                                    <button type="button" class="vp-machdetails__ipeditbtn vp-uielement__button vp-uielement__button--cleanenabled pa--none" ng-click="undeployTool(tool.version._id.$oid, tool.build_no, tool.build_id, Machine.data._id.$oid)">Undeploy</button>
                                </div>
                            </div>
                            <div class="vp-deployedtool_actions_col vertical--bottom text--regular text--lg inblock" ng-if="tool.checksum">
                                <div class="vp-machdetails__fieldtypewrap vp-machdetails__editablewrap inblock">
                                    <button type="button" class="vp-machdetails__ipeditbtn vp-uielement__button vp-uielement__button--cleanenabled pa--none" ng-click="viewChecksumPopup(tool.checksum)">Checksum</button>
                                </div>
                            </div>
                            <div class="vp-deployedtool_actions_col vertical--bottom text--regular text--lg inblock" ng-if="tool.dep_group_details">
                                <div class="vp-machdetails__fieldtypewrap vp-machdetails__editablewrap inblock">
                                    <button type="button" class="vp-machdetails__ipeditbtn vp-uielement__button vp-uielement__button--cleanenabled pa--none" ng-click="DeploymentGroupDetails(tool.dep_group_details._id)">{{tool.dep_group_details.name}}</button>
                                </div>
                            </div>
                        </div>
                    </li>
                </ul>
            </form>
        </section>
    </div>
</div>
<!--MACHINE DETAILS VERTICAL TAB CONTENT COMPONENT END-->
