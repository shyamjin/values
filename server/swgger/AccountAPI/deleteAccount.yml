fetch a particular account, referring the account by Account Id
---
tags:
  - Accounts
parameters:
- name: token
  in: header
  description: API key
  required: false
  type: string
  format: string
- name: access-token
  in: header
  description: API key
  required: false
  type: string
  format: string  
- name: id
  in: path
  type: string
  required: true
  description: Account Id

responses:
  200:
    description: Account was deleted successfully
    examples:
    result: "success"
    message: "Account was deleted"
  404:
    description: exception in deleting account
    examples:
    result: "failed"
    message: "Throws an exception"