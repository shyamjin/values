provide user name and password in order to get token for using other API---tags:   - UsersecurityDefinitions:  basicAuth:   type: basicresponses:  200:    description: token was generated for existing user found    schema:        $ref: "#/definitions/Data"     # <---------    examples:      data:        - token: "dknfvjn35i34yt984yh"      result: "success"      message: "token was generated for existing user found"  404:    description: unable to login    examples:      result: "failed"      message: "Invalid user password"