provide user name and password in order to get token for using other API
---
tags:
   - User
parameters:
- name: user
  in: body
  description: username
  required: true
  type: string
  format: string
  schema:
    $ref: "#/definitions/User"     # <---------

responses:
  200:
    description: token was generated for existing user found
    schema:
        $ref: "#/definitions/Data"     # <---------
    examples:
      data:
        - token: "dknfvjn35i34yt984yh"
      result: "success"
      message: "token was generated for existing user found"
  404:
    description: unable to login
    examples:
      result: "failed"
      message: "Invalid user password"

definitions:
  User:           # <----------
    type: object
    required:
      - user
      - password
    properties:
      user:
        type: string
        default: admin
      password:
        type: string
  Data:
    type: object
    properties:
        data:
          type: string
        result:
          type: string
        message:
           type: string