fetch a particular state, referring the state by Parent Entity Id
---
tags:
  - States
parameters:
- name: token
  in: header
  description: API key
  required: false
  type: string
  format: string
- name: access-token
  in: header
  description: API key
  required: false
  type: string
  format: string 
- name: parent_entity_id
  in: path
  type: string
  required: true
  description: Parent Entity Id

responses:
  200:
    description: Get state by Parent Entity Id
    examples:
    result: "success"
    message: null
  404:
    description: exception in fetching state
    examples:
    result: "failed"
    message: "Throws an exception"
