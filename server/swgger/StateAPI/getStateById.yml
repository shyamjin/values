fetch a particular state, referring the state by State Id
---
tags:
  - States
parameters:
- name: token
  in: header
  description: API key
  required: false
  type: string
  format: string
- name: access-token
  in: header
  description: API key
  required: false
  type: string
  format: string 
- name: state_id
  in: path
  type: string
  required: true
  description: State Id

responses:
  200:
    description: Get state by State Id
    examples:
    result: "success"
    message: null
  404:
    description: exception in fetching state
    examples:
    result: "failed"
    message: "Throws an exception"
